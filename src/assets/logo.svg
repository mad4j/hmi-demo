<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Panel background -->
  <rect width="64" height="64" rx="12" fill="#0d1117"/>
  <!-- Screen bezel -->
  <rect x="6" y="8" width="52" height="36" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <!-- Waveform on screen -->
  <polyline
    points="10,34 16,28 20,38 26,20 32,30 36,24 42,32 48,28 54,34"
    fill="none"
    stroke="#3fb950"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Status LEDs at bottom -->
  <circle cx="20" cy="54" r="4" fill="#3fb950"/>
  <circle cx="32" cy="54" r="4" fill="#58a6ff"/>
  <circle cx="44" cy="54" r="4" fill="#30363d"/>
</svg>
