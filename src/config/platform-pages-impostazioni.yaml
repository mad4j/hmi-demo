pages:
  - id: impostazioni
    label: Settings
    icon: "settings"
    parameters: []
    submenus:
      - id: tema
        label: Theme
        icon: "theme"
        selectionMode: "picker"
        parameters: []
      - id: gps
        label: GPS
        icon: "gps"
        parameters:
          - id: gps_stato
            name: Status
            type: enum
            options: [LOCKED, SEARCHING, ERROR, INACTIVE]
            readonly: true
          - id: gps_satelliti
            name: Satellites
            type: number
            unit: "sat"
            precision: 0
            readonly: true
          - id: gps_latitudine
            name: Latitude
            type: number
            unit: "°"
            precision: 5
            readonly: true
          - id: gps_longitudine
            name: Longitude
            type: number
            unit: "°"
            precision: 5
            readonly: true
          - id: gps_altitudine
            name: Altitude
            type: number
            unit: "m"
            precision: 0
            readonly: true
          - id: gps_notes
            name: Notes
            type: text
            readonly: false
          - id: gps_velocita
            name: Speed
            type: number
            unit: "km/h"
            precision: 1
            readonly: true
          - id: gps_accuratezza
            name: Accuracy
            type: number
            unit: "m"
            precision: 1
            readonly: true
          - id: gps_modalita
            name: Mode
            type: enum
            options: [AUTO, MANUAL, INACTIVE]
      - id: login
        label: Login
        icon: "login"
        mode: transaction
        goOnApply: GO_BACK
        parameters:
          - id: login_name
            name: Name
            type: text
            clearOnApply: true
          - id: login_password
            name: Password
            type: password
            clearOnApply: true
      - id: logout
        label: Logout
        icon: "lock"
        visibility: hidden
        goOnApply: STAY_HERE
        parameters: []
