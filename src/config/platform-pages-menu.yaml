pages:
  - id: menu
    label: Menu
    icon: "menu"
    submenus:
      - id: climatizzazione
        label: Climatizzazione
        parameters:
          - id: temp_abitacolo
            name: Temperatura
            type: number
            unit: "°C"
            precision: 1
            readonly: true
          - id: temp_impostata
            name: Impostata
            type: number
            unit: "°C"
            precision: 1
          - id: temp_esterna
            name: Temp. esterna
            type: number
            unit: "°C"
            precision: 1
            readonly: true
          - id: umidita
            name: Umidità
            type: percentage
            precision: 0
            readonly: true
          - id: ventilazione_attiva
            name: Ventilazione
            type: boolean
          - id: aria_ricircolo
            name: Ricircolo
            type: boolean
          - id: velocita_ventola
            name: Velocità ventola
            type: number
            unit: "lv"
            precision: 0
          - id: modalita_clima
            name: Modalità
            type: enum
            options: [AUTO, MANUAL, ECO, SPORT]
      - id: porte
        label: Porte
        panels:
          - label: Porte ant.
            parameters:
              - id: porta_ant_sx
                name: Ant. SX
                type: boolean
              - id: porta_ant_dx
                name: Ant. DX
                type: boolean
              - id: porta_post_sx
                name: Post. SX
                type: boolean
              - id: porta_post_dx
                name: Post. DX
                type: boolean
          - label: Porte post.
            parameters:
              - id: blocco_centrale
                name: Blocco centr.
                type: boolean
              - id: cofano
                name: Cofano
                type: boolean
              - id: portabagagli
                name: Bagagliaio
                type: boolean
              - id: finestre_chiuse
                name: Finestre
                type: boolean
              - id: portellone
                name: Portellone
                type: boolean
      - id: visualizzazione_estesa
        label: Visualizzazione estesa
        parameters:
          - id: test_viz_temp_motore
            name: Temp. motore
            type: number
            unit: "°C"
            precision: 1
            readonly: true
          - id: test_viz_press_turbo
            name: Press. turbo
            type: number
            unit: "bar"
            precision: 2
            readonly: true
          - id: test_viz_corrente
            name: Corrente
            type: number
            unit: "A"
            precision: 1
            readonly: true
          - id: test_viz_tensione_aux
            name: Tensione aux
            type: number
            unit: "V"
            precision: 1
            readonly: true
          - id: test_viz_memoria_libera
            name: Memoria libera
            type: percentage
            precision: 0
            readonly: true
          - id: test_viz_cpu_load
            name: CPU load
            type: percentage
            precision: 0
            readonly: true
          - id: test_viz_ventola_motore
            name: Ventola motore
            type: number
            unit: "rpm"
            precision: 0
            readonly: true
          - id: test_viz_ventola_hmi
            name: Ventola HMI
            type: number
            unit: "rpm"
            precision: 0
            readonly: true
          - id: test_viz_freno_usura
            name: Usura freni
            type: percentage
            precision: 0
            readonly: true
          - id: test_viz_stato_bus
            name: Stato bus
            type: enum
            options: [OK, DEGRADED, OFFLINE]
            readonly: true
          - id: test_viz_profilo_guida
            name: Profilo guida
            type: enum
            options: [CITY, TOURING, TRACK, ECO]
          - id: test_viz_manutenzione
            name: Manutenzione
            type: enum
            options: [NONE, SOON, DUE, OVERDUE]
            readonly: true
          - id: test_viz_last_service
            name: Ultimo service
            type: date
            readonly: true
          - id: test_viz_next_service
            name: Prossimo service
            type: date
          - id: test_viz_note_officina
            name: Note officina
            type: text
          - id: test_viz_codice_intervento
            name: Codice intervento
            type: text
          - id: test_viz_revisione_cfg
            name: Revisione cfg
            type: text
            readonly: true
          - id: test_viz_build_number
            name: Build number
            type: text
            readonly: true
      - id: pannelli_transazione
        label: Pannelli transazione
        mode: transaction
        goOnApply: STAY_HERE
        panels:
          - label: Credenziali
            parameters:
              - id: test_trx_username
                name: Username
                type: text
                clearOnApply: true
              - id: test_trx_password
                name: Password
                type: password
                clearOnApply: true
              - id: test_trx_ruolo
                name: Ruolo
                type: enum
                options: [OPERATORE, SUPERVISORE, MANUTENTORE]
          - label: Limiti
            parameters:
              - id: test_trx_soglia_warn
                name: Soglia warning
                type: percentage
                precision: 0
              - id: test_trx_soglia_alarm
                name: Soglia allarme
                type: percentage
                precision: 0
              - id: test_trx_data_validita
                name: Data validita
                type: date
          - label: Workflow
            parameters:
              - id: test_trx_modalita
                name: Modalita salvataggio
                type: enum
                options: [DRAFT, VALIDATA, PUBBLICATA]
              - id: test_trx_ticket
                name: Ticket
                type: text
              - id: test_trx_note
                name: Note rilascio
