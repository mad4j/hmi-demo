title: HMI Demo
statusIcons:
  - id: fault
    label: Stato guasto
    icon: fault
    pageId: allarmi
    parameterId: status_fault
  - id: channel
    label: Stato canale
    icon: channel
    pageId: info
    parameterId: status_channel
  - id: gps
    label: Stato GPS
    icon: gps
    pageId: gps
    parameterId: status_gps
  - id: login
    label: Stato accesso
    icon: login
    pageId: login
    pageIdByState:
      off: login
      ok: logout
    parameterId: status_login
pages:
  - id: menu
    label: Menu
    icon: "menu"
    submenus:
      - id: climatizzazione
        label: Climatizzazione
        parameters:
          - id: temp_abitacolo
            name: Temperatura
            type: number
            unit: "°C"
            precision: 1
            readonly: true
          - id: temp_impostata
            name: Impostata
            type: number
            unit: "°C"
            precision: 1
          - id: temp_esterna
            name: Temp. esterna
            type: number
            unit: "°C"
            precision: 1
            readonly: true
          - id: umidita
            name: Umidità
            type: percentage
            precision: 0
            readonly: true
          - id: ventilazione_attiva
            name: Ventilazione
            type: boolean
          - id: aria_ricircolo
            name: Ricircolo
            type: boolean
          - id: velocita_ventola
            name: Velocità ventola
            type: number
            unit: "lv"
            precision: 0
          - id: modalita_clima
            name: Modalità
            type: enum
            options: [AUTO, MANUAL, ECO, SPORT]
      - id: porte
        label: Porte
        parameters:
          - id: porta_ant_sx
            name: Ant. SX
            type: boolean
          - id: porta_ant_dx
            name: Ant. DX
            type: boolean
          - id: porta_post_sx
            name: Post. SX
            type: boolean
          - id: porta_post_dx
            name: Post. DX
            type: boolean
          - id: blocco_centrale
            name: Blocco centr.
            type: boolean
          - id: cofano
            name: Cofano
            type: boolean
          - id: portabagagli
            name: Bagagliaio
            type: boolean
          - id: finestre_chiuse
            name: Finestre
            type: boolean
          - id: portellone
            name: Portellone
            type: boolean
  - id: allarmi
    label: Allarmi
    icon: "alarm"
    parameters:
      - id: allarme_batteria
        name: Batteria
        type: boolean
        readonly: true
      - id: allarme_temp_motore
        name: Temp. motore
        type: boolean
        readonly: true
      - id: allarme_pressione
        name: Pressione
        type: boolean
        readonly: true
      - id: allarme_olio
        name: Olio motore
        type: boolean
        readonly: true
      - id: allarme_abs
        name: ABS
        type: boolean
        readonly: true
      - id: allarme_airbag
        name: Airbag
        type: boolean
        readonly: true
      - id: allarme_carburante
        name: Carburante
        type: boolean
        readonly: true
      - id: livello_carburante
        name: Livello carb.
        type: percentage
        precision: 0
        readonly: true
  - id: info
    label: Info
    icon: "info"
    parameters:
      - id: versione_hmi
        name: Versione HMI
        type: enum
        readonly: true
      - id: stato_rete
        name: Stato rete
        type: enum
        options: [ONLINE, OFFLINE]
        readonly: true
      - id: connessione
        name: Connessione
        type: enum
        options: [CAN-BUS, WIFI, ETH]
        readonly: true
      - id: uptime
        name: Uptime
        type: number
        unit: min
        precision: 0
        readonly: true
      - id: tensione_batteria
        name: Tensione batt.
        type: number
        unit: "V"
        precision: 1
        readonly: true
      - id: temperatura_cpu
        name: Temp. CPU
        type: number
        unit: "°C"
        precision: 0
        readonly: true
      - id: data_sistema
        name: Data
        type: date
        readonly: false
      - id: ora_sistema
        name: Ora
        type: enum
        readonly: true
  - id: impostazioni
    label: Impostazioni
    icon: "settings"
    parameters: []
    submenus:
      - id: tema
        label: Tema
        icon: "theme"
        parameters: []
      - id: gps
        label: GPS
        icon: "gps"
        parameters:
          - id: gps_stato
            name: Stato
            type: enum
            options: [AGGANCIATO, IN RICERCA, ERRORE, DISATTIVO]
            readonly: true
          - id: gps_satelliti
            name: Satelliti
            type: number
            unit: "sat"
            precision: 0
            readonly: true
          - id: gps_latitudine
            name: Latitudine
            type: number
            unit: "°"
            precision: 5
            readonly: true
          - id: gps_longitudine
            name: Longitudine
            type: number
            unit: "°"
            precision: 5
            readonly: true
          - id: gps_altitudine
            name: Altitudine
            type: number
            unit: "m"
            precision: 0
            readonly: true
          - id: gps_notes
            name: Notes
            type: text
            readonly: false  
          - id: gps_velocita
            name: Velocità
            type: number
            unit: "km/h"
            precision: 1
            readonly: true
          - id: gps_accuratezza
            name: Accuratezza
            type: number
            unit: "m"
            precision: 1
            readonly: true
          - id: gps_modalita
            name: Modalità
            type: enum
            options: [AUTO, MANUALE, DISATTIVO]
      - id: login
        label: Accesso
        icon: "login"
        parameters:
          - id: login_name
            name: Name
            type: text
          - id: login_password
            name: Password
            type: password
      - id: logout
        label: Logout
        icon: "lock"
        parameters: []
